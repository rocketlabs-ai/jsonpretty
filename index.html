<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONPretty — JSON Formatter &amp; Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @layer base, layout, components, states;

  @layer base {
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0a;
      --bg2: #0f120f;
      --bg3: #141814;
      --bg4: #1a1f1a;
      --border: #1e261e;
      --border2: #2a352a;
      --fg: #c8d8c0;
      --fg2: #8fa882;
      --fg3: #5a6e52;
      --phosphor: #4dff91;
      --phosphor2: #2db865;
      --phosphor-dim: rgba(77,255,145,0.12);
      --phosphor-glow: 0 0 8px rgba(77,255,145,0.25);
      --amber: #f5a623;
      --red: #ff4d6a;
      --blue: #4db8ff;
      --purple: #b48cff;
      --null-c: #ff8c4d;
      --bool-c: #f5a623;
      --num-c: #4db8ff;
      --str-c: #4dff91;
      --key-c: #c8d8c0;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
      --radius: 3px;
      --gap: 12px;
    }

    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    ::selection { background: rgba(77,255,145,0.2); color: var(--phosphor); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--phosphor2); }
  }

  @layer layout {
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .logo-mark {
      font-size: 18px;
      font-weight: 600;
      color: var(--phosphor);
      letter-spacing: -0.5px;
      text-shadow: var(--phosphor-glow);
    }
    .logo-sub {
      font-size: 10px;
      font-weight: 300;
      color: var(--fg3);
      font-family: var(--sans);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .pane + .pane { border-left: 1px solid var(--border); }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pane-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fg3);
      font-family: var(--sans);
    }
    .pane-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .output-area {
      flex: 1;
      overflow: auto;
      padding: 14px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 16px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: var(--sans);
      font-weight: 500;
      color: var(--fg3);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--fg); }
    .tab.active {
      color: var(--phosphor);
      border-bottom-color: var(--phosphor);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      font-size: 10px;
      color: var(--fg3);
      flex-shrink: 0;
      gap: 8px;
      flex-wrap: wrap;
      font-family: var(--sans);
    }
    .status-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .stat-label { color: var(--fg3); }
    .stat-val { color: var(--fg2); font-family: var(--mono); }

    footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: var(--fg3);
      font-family: var(--sans);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    footer a { color: var(--fg3); text-decoration: none; }
    footer a:hover { color: var(--phosphor); }
  }

  @layer components {
    /* Buttons */
    .btn {
      padding: 5px 12px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--fg2);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: var(--phosphor2);
      color: var(--phosphor);
      background: var(--phosphor-dim);
    }
    .btn.active {
      border-color: var(--phosphor);
      color: var(--phosphor);
      background: var(--phosphor-dim);
      box-shadow: var(--phosphor-glow);
    }
    .btn-primary {
      border-color: var(--phosphor2);
      color: var(--phosphor);
      background: var(--phosphor-dim);
    }
    .btn-primary:hover {
      background: rgba(77,255,145,0.2);
    }
    .btn-danger:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(255,77,106,0.1);
    }
    .btn-copy.copied {
      border-color: var(--phosphor);
      color: var(--phosphor);
    }

    /* Input textarea */
    textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: var(--fg);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
      padding: 0;
    }
    textarea::placeholder { color: var(--fg3); }

    /* Indent select */
    select {
      padding: 5px 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--fg2);
      font-family: var(--mono);
      font-size: 11px;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
    }
    select:hover { border-color: var(--phosphor2); }
    select option { background: var(--bg3); }

    /* Validation message */
    .validation-msg {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      font-size: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
      min-height: 0;
    }
    .validation-msg.hidden { display: none; }
    .validation-msg.ok {
      color: var(--phosphor2);
      border-bottom-color: rgba(77,255,145,0.15);
      background: rgba(77,255,145,0.04);
    }
    .validation-msg.error {
      color: var(--red);
      border-bottom-color: rgba(255,77,106,0.2);
      background: rgba(255,77,106,0.05);
    }
    .validation-icon { flex-shrink: 0; font-size: 14px; }

    /* Path display */
    .path-display {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      font-size: 11px;
      min-height: 34px;
      flex-shrink: 0;
    }
    .path-label { color: var(--fg3); font-family: var(--sans); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .path-value {
      color: var(--phosphor);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .path-copy-btn {
      padding: 2px 7px;
      font-size: 10px;
      flex-shrink: 0;
    }

    /* Formatted JSON */
    .json-output {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .json-output .k { color: var(--key-c); }
    .json-output .s { color: var(--str-c); }
    .json-output .n { color: var(--num-c); }
    .json-output .b { color: var(--bool-c); }
    .json-output .z { color: var(--null-c); }
    .json-output .p { color: var(--fg3); }

    /* Tree view */
    .tree {
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.6;
    }
    .tree-node { position: relative; }
    .tree-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 1px 0;
      cursor: default;
      border-radius: 2px;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .tree-row:hover { background: var(--bg4); }
    .tree-row.selected {
      background: var(--phosphor-dim);
    }
    .tree-row.clickable { cursor: pointer; }

    .tree-indent { display: inline-block; }
    .tree-toggle {
      display: inline-block;
      width: 14px;
      text-align: center;
      color: var(--fg3);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 11px;
      transition: transform 0.15s;
      user-select: none;
    }
    .tree-toggle.open { color: var(--phosphor2); }
    .tree-toggle.leaf { cursor: default; opacity: 0; }

    .tree-key { color: var(--key-c); }
    .tree-colon { color: var(--fg3); }
    .tree-type-badge {
      display: inline-block;
      font-size: 9px;
      font-family: var(--sans);
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: lowercase;
      flex-shrink: 0;
    }
    .badge-string { background: rgba(77,255,145,0.12); color: var(--str-c); }
    .badge-number { background: rgba(77,184,255,0.12); color: var(--num-c); }
    .badge-boolean { background: rgba(245,166,35,0.12); color: var(--bool-c); }
    .badge-null { background: rgba(255,140,77,0.12); color: var(--null-c); }
    .badge-object { background: rgba(200,216,192,0.08); color: var(--fg2); }
    .badge-array { background: rgba(180,140,255,0.12); color: var(--purple); }

    .tree-count {
      font-size: 10px;
      color: var(--fg3);
      font-family: var(--sans);
    }
    .tree-val-string { color: var(--str-c); }
    .tree-val-number { color: var(--num-c); }
    .tree-val-boolean { color: var(--bool-c); }
    .tree-val-null { color: var(--null-c); }

    .tree-children { display: block; padding-left: 0; }
    .tree-children.collapsed { display: none; }

    .tree-connector {
      color: var(--border2);
      font-family: var(--mono);
      user-select: none;
      flex-shrink: 0;
    }

    /* Empty/loading states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--fg3);
      text-align: center;
      padding: 40px;
    }
    .empty-icon { font-size: 32px; opacity: 0.4; }
    .empty-title { font-size: 13px; color: var(--fg2); font-family: var(--sans); }
    .empty-sub { font-size: 11px; line-height: 1.7; max-width: 280px; }

    /* Scan line effect on header */
    header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--phosphor2), transparent);
      opacity: 0.3;
    }
    header { position: relative; }

    /* Blink cursor in logo */
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--phosphor);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input drag highlight */
    .pane.drag-over .output-area { background: var(--phosphor-dim); }

    /* Minified output */
    .minified-output {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg2);
      word-break: break-all;
      line-height: 1.7;
    }
  }

  @layer states {
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh 1fr;
        overflow: auto;
      }
      .pane { min-height: 50vh; }
      .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
      header { padding: 10px 14px; }
    }

    @media (max-width: 480px) {
      .header-controls { gap: 5px; }
      .logo-sub { display: none; }
      .status-chips { gap: 8px; }
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">JSON<span style="color:var(--fg2)">Pretty</span><span class="cursor-blink"></span></span>
    <span class="logo-sub">Formatter &amp; Explorer</span>
  </div>
  <div class="header-controls">
    <label style="font-size:10px;color:var(--fg3);font-family:var(--sans);letter-spacing:1px;text-transform:uppercase;margin-right:2px;">Indent</label>
    <select id="indentSelect" title="Indent style">
      <option value="2">2 spaces</option>
      <option value="4">4 spaces</option>
      <option value="tab">tab</option>
    </select>
    <button class="btn" id="formatBtn" title="Format JSON">format</button>
    <button class="btn" id="minifyBtn" title="Minify JSON">minify</button>
    <button class="btn btn-danger" id="clearBtn" title="Clear input">clear</button>
  </div>
</header>

<main>
  <!-- Left pane: Input -->
  <div class="pane" id="inputPane">
    <div class="pane-header">
      <span class="pane-title">Input</span>
      <div class="pane-actions">
        <button class="btn" id="pasteBtn" title="Paste from clipboard">paste</button>
        <button class="btn" id="sampleBtn" title="Load sample JSON">sample</button>
      </div>
    </div>
    <div class="validation-msg hidden" id="validationMsg">
      <span class="validation-icon" id="validationIcon"></span>
      <span id="validationText"></span>
    </div>
    <div class="output-area" id="inputArea">
      <textarea
        id="jsonInput"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="Paste or type JSON here...&#10;&#10;Drag &amp; drop a .json file to load it."
      ></textarea>
    </div>
  </div>

  <!-- Right pane: Output -->
  <div class="pane" id="outputPane">
    <div class="tabs">
      <button class="tab active" data-tab="formatted" id="tab-formatted">Formatted</button>
      <button class="tab" data-tab="tree" id="tab-tree">Tree</button>
      <button class="tab" data-tab="minified" id="tab-minified">Minified</button>
    </div>
    <div class="pane-header">
      <span class="pane-title" id="outputPaneTitle">Pretty Print</span>
      <div class="pane-actions">
        <button class="btn btn-copy" id="copyBtn" title="Copy output">copy</button>
        <button class="btn" id="expandAllBtn" title="Expand all tree nodes" style="display:none">expand all</button>
        <button class="btn" id="collapseAllBtn" title="Collapse all tree nodes" style="display:none">collapse all</button>
      </div>
    </div>
    <div class="path-display" id="pathDisplay" style="display:none">
      <span class="path-label">path</span>
      <span class="path-value" id="pathValue">$</span>
      <button class="btn path-copy-btn" id="pathCopyBtn">copy</button>
    </div>
    <div class="output-area" id="outputArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">{ }</div>
        <div class="empty-title">No JSON yet</div>
        <div class="empty-sub">Paste JSON on the left to format, explore, and validate it.</div>
      </div>
      <div class="json-output" id="formattedOutput" style="display:none"></div>
      <div id="treeOutput" style="display:none"></div>
      <div class="minified-output" id="minifiedOutput" style="display:none"></div>
    </div>
    <div class="status-bar">
      <div class="status-chips" id="statsChips">
        <div class="stat-chip"><span class="stat-label">keys</span><span class="stat-val" id="statKeys">—</span></div>
        <div class="stat-chip"><span class="stat-label">depth</span><span class="stat-val" id="statDepth">—</span></div>
        <div class="stat-chip"><span class="stat-label">size</span><span class="stat-val" id="statSize">—</span></div>
        <div class="stat-chip"><span class="stat-label">type</span><span class="stat-val" id="statType">—</span></div>
      </div>
      <span id="statusMsg" style="color:var(--fg3);font-size:10px;"></span>
    </div>
  </div>
</main>

<footer>Built by <a href="#" style="color:var(--phosphor2)">Rocket Labs AI</a> &mdash; JSONPretty runs entirely in your browser. No data is sent anywhere.</footer>

<script>
(function() {
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let parsed = null;
let currentTab = 'formatted';
let currentPath = '$';
let selectedTreeRow = null;

// ── Elements ───────────────────────────────────────────────────────────────
const el = id => document.getElementById(id);
const jsonInput      = el('jsonInput');
const validationMsg  = el('validationMsg');
const validationIcon = el('validationIcon');
const validationText = el('validationText');
const formattedOutput = el('formattedOutput');
const treeOutput     = el('treeOutput');
const minifiedOutput = el('minifiedOutput');
const emptyState     = el('emptyState');
const pathDisplay    = el('pathDisplay');
const pathValue      = el('pathValue');
const statKeys       = el('statKeys');
const statDepth      = el('statDepth');
const statSize       = el('statSize');
const statType       = el('statType');
const statusMsg      = el('statusMsg');
const expandAllBtn   = el('expandAllBtn');
const collapseAllBtn = el('collapseAllBtn');

// ── Indent ─────────────────────────────────────────────────────────────────
function getIndent() {
  const v = el('indentSelect').value;
  if (v === 'tab') return '\t';
  return ' '.repeat(parseInt(v, 10));
}

// ── Validation ─────────────────────────────────────────────────────────────
function showValid() {
  validationMsg.className = 'validation-msg ok';
  validationIcon.textContent = '✓';
  validationText.textContent = 'Valid JSON';
}

function showError(e) {
  validationMsg.className = 'validation-msg error';
  validationIcon.textContent = '✗';
  // Parse position from error message
  let msg = e.message;
  // Try to extract line/col from common formats
  const posMatch = msg.match(/position (\d+)/i);
  if (posMatch) {
    const pos = parseInt(posMatch[1], 10);
    const before = jsonInput.value.substring(0, pos);
    const line = before.split('\n').length;
    const col = pos - before.lastIndexOf('\n');
    msg = `${e.message} (line ${line}, col ${col})`;
  }
  validationText.textContent = msg;
}

function hideValidation() {
  validationMsg.className = 'validation-msg hidden';
}

// ── Parse + process ────────────────────────────────────────────────────────
function processInput(raw) {
  if (!raw.trim()) {
    parsed = null;
    hideValidation();
    showEmpty();
    clearStats();
    return;
  }
  try {
    parsed = JSON.parse(raw);
    showValid();
    updateStats(parsed, raw);
    renderCurrentTab();
  } catch(e) {
    parsed = null;
    showError(e);
    showEmpty();
    clearStats();
  }
}

function showEmpty() {
  emptyState.style.display = '';
  formattedOutput.style.display = 'none';
  treeOutput.style.display = 'none';
  minifiedOutput.style.display = 'none';
  pathDisplay.style.display = 'none';
  expandAllBtn.style.display = 'none';
  collapseAllBtn.style.display = 'none';
}

// ── Stats ──────────────────────────────────────────────────────────────────
function clearStats() {
  statKeys.textContent = statDepth.textContent = statSize.textContent = statType.textContent = '—';
}

function computeStats(data) {
  let keys = 0, maxDepth = 0;
  function walk(v, depth) {
    if (depth > maxDepth) maxDepth = depth;
    if (v && typeof v === 'object') {
      const ks = Object.keys(v);
      keys += ks.length;
      ks.forEach(k => walk(v[k], depth + 1));
    }
  }
  walk(data, 0);
  return { keys, maxDepth };
}

function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/(1024*1024)).toFixed(2) + ' MB';
}

function getType(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v;
}

function updateStats(data, raw) {
  const { keys, maxDepth } = computeStats(data);
  statKeys.textContent = keys.toLocaleString();
  statDepth.textContent = maxDepth;
  statSize.textContent = fmtBytes(new TextEncoder().encode(raw).length);
  statType.textContent = getType(data);
}

// ── Syntax highlighting ────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(json) {
  // Tokenize with regex for performance on large JSON
  return json.replace(
    /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|-?\d+\.?\d*(?:[eE][+\-]?\d+)?|true|false|null|[{}\[\],:])/g,
    function(match) {
      let cls = 'p'; // punctuation
      if (/^"/.test(match)) {
        cls = match.endsWith(':') ? 'k' : 's';
      } else if (/true|false/.test(match)) {
        cls = 'b';
      } else if (/null/.test(match)) {
        cls = 'z';
      } else if (/^-?\d/.test(match)) {
        cls = 'n';
      }
      return `<span class="${cls}">${escapeHtml(match)}</span>`;
    }
  );
}

// ── Render tabs ────────────────────────────────────────────────────────────
function renderCurrentTab() {
  if (!parsed && parsed !== null) return;
  if (parsed === null && currentTab !== 'formatted') return;

  emptyState.style.display = 'none';

  if (currentTab === 'formatted') {
    formattedOutput.style.display = '';
    treeOutput.style.display = 'none';
    minifiedOutput.style.display = 'none';
    pathDisplay.style.display = 'none';
    expandAllBtn.style.display = 'none';
    collapseAllBtn.style.display = 'none';

    const pretty = JSON.stringify(parsed, null, getIndent());
    formattedOutput.innerHTML = highlight(pretty);
    el('outputPaneTitle').textContent = 'Pretty Print';

  } else if (currentTab === 'tree') {
    formattedOutput.style.display = 'none';
    treeOutput.style.display = '';
    minifiedOutput.style.display = 'none';
    pathDisplay.style.display = 'flex';
    expandAllBtn.style.display = '';
    collapseAllBtn.style.display = '';

    treeOutput.innerHTML = '';
    treeOutput.appendChild(buildTree(parsed, '$', null, true));
    el('outputPaneTitle').textContent = 'Tree View';
    currentPath = '$';
    pathValue.textContent = '$';
    selectedTreeRow = null;

  } else if (currentTab === 'minified') {
    formattedOutput.style.display = 'none';
    treeOutput.style.display = 'none';
    minifiedOutput.style.display = '';
    pathDisplay.style.display = 'none';
    expandAllBtn.style.display = 'none';
    collapseAllBtn.style.display = 'none';

    minifiedOutput.textContent = JSON.stringify(parsed);
    el('outputPaneTitle').textContent = 'Minified';
  }
}

// ── Tree builder ───────────────────────────────────────────────────────────
function buildTree(value, path, key, isRoot) {
  const type = getType(value);
  const isExpandable = type === 'object' || type === 'array';
  const nodeEl = document.createElement('div');
  nodeEl.className = 'tree-node';

  const rowEl = document.createElement('div');
  rowEl.className = 'tree-row' + (isExpandable ? ' clickable' : '');
  rowEl.dataset.path = path;

  // Toggle
  const toggleEl = document.createElement('span');
  toggleEl.className = 'tree-toggle' + (isExpandable ? ' open' : ' leaf');
  toggleEl.textContent = isExpandable ? '▾' : '·';

  // Key label
  if (key !== null) {
    const keyEl = document.createElement('span');
    keyEl.className = 'tree-key';
    keyEl.textContent = typeof key === 'number' ? `[${key}]` : `"${key}"`;
    rowEl.appendChild(keyEl);

    const colonEl = document.createElement('span');
    colonEl.className = 'tree-colon';
    colonEl.textContent = ': ';
    rowEl.appendChild(colonEl);
  }

  rowEl.insertBefore(toggleEl, rowEl.firstChild);

  // Badge
  const badge = document.createElement('span');
  badge.className = `tree-type-badge badge-${type}`;
  badge.textContent = type;
  rowEl.appendChild(badge);

  if (isExpandable) {
    const count = Object.keys(value).length;
    const countEl = document.createElement('span');
    countEl.className = 'tree-count';
    countEl.textContent = type === 'array' ? `[${count}]` : `{${count}}`;
    rowEl.appendChild(countEl);
  } else {
    // Scalar value
    const valEl = document.createElement('span');
    valEl.className = `tree-val-${type}`;
    if (type === 'string') {
      const truncated = value.length > 80 ? value.substring(0,80) + '…' : value;
      valEl.textContent = `"${truncated}"`;
      valEl.title = value;
    } else {
      valEl.textContent = String(value);
    }
    rowEl.appendChild(valEl);
  }

  // Row click handler
  rowEl.addEventListener('click', function(e) {
    // Update selected
    if (selectedTreeRow) selectedTreeRow.classList.remove('selected');
    rowEl.classList.add('selected');
    selectedTreeRow = rowEl;

    currentPath = path;
    pathValue.textContent = path;

    // Toggle expand/collapse
    if (isExpandable) {
      const children = nodeEl.querySelector('.tree-children');
      if (children) {
        const isCollapsed = children.classList.contains('collapsed');
        children.classList.toggle('collapsed', !isCollapsed);
        toggleEl.classList.toggle('open', !isCollapsed);
        toggleEl.textContent = !isCollapsed ? '▾' : '▸';
      }
    }
  });

  nodeEl.appendChild(rowEl);

  if (isExpandable) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children';
    childrenEl.style.paddingLeft = '18px';

    const entries = type === 'array'
      ? value.map((v, i) => [i, v])
      : Object.entries(value);

    entries.forEach(([k, v]) => {
      const childPath = type === 'array'
        ? `${path}[${k}]`
        : /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? `${path}.${k}` : `${path}["${k}"]`;
      childrenEl.appendChild(buildTree(v, childPath, k, false));
    });

    nodeEl.appendChild(childrenEl);
  }

  return nodeEl;
}

// ── Expand/Collapse all ───────────────────────────────────────────────────
function setAllTreeNodes(collapse) {
  const children = treeOutput.querySelectorAll('.tree-children');
  const toggles = treeOutput.querySelectorAll('.tree-toggle:not(.leaf)');
  children.forEach(c => c.classList.toggle('collapsed', collapse));
  toggles.forEach(t => {
    t.classList.toggle('open', !collapse);
    t.textContent = collapse ? '▸' : '▾';
  });
}

expandAllBtn.addEventListener('click', () => setAllTreeNodes(false));
collapseAllBtn.addEventListener('click', () => setAllTreeNodes(true));

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.tab;
    if (parsed !== null) renderCurrentTab();
  });
});

// ── Controls ───────────────────────────────────────────────────────────────
el('formatBtn').addEventListener('click', () => {
  if (parsed !== null) {
    const pretty = JSON.stringify(parsed, null, getIndent());
    jsonInput.value = pretty;
    processInput(pretty);
  }
});

el('minifyBtn').addEventListener('click', () => {
  if (parsed !== null) {
    const min = JSON.stringify(parsed);
    jsonInput.value = min;
    processInput(min);
  }
});

el('clearBtn').addEventListener('click', () => {
  jsonInput.value = '';
  parsed = null;
  hideValidation();
  showEmpty();
  clearStats();
});

el('pasteBtn').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    jsonInput.value = text;
    processInput(text);
  } catch {
    jsonInput.focus();
    document.execCommand('paste');
  }
});

el('sampleBtn').addEventListener('click', () => {
  const sample = {
    "store": {
      "name": "Rocket Labs Store",
      "version": "2.1.0",
      "active": true,
      "metadata": null,
      "products": [
        { "id": 1, "name": "JSON Formatter Pro", "price": 9.99, "tags": ["dev", "tools"], "inStock": true },
        { "id": 2, "name": "Regex Explorer", "price": 14.99, "tags": ["dev", "regex", "tools"], "inStock": false },
        { "id": 3, "name": "API Tester Suite", "price": 24.99, "tags": ["dev", "api", "testing"], "inStock": true }
      ],
      "stats": { "totalProducts": 3, "totalValue": 49.97, "currency": "USD" },
      "contact": { "email": "hello@rocketlabs.ai", "twitter": "@rocketlabsai", "discord": "discord.gg/rocketlabs" }
    }
  };
  const text = JSON.stringify(sample, null, 2);
  jsonInput.value = text;
  processInput(text);
});

// ── Copy ───────────────────────────────────────────────────────────────────
function flashCopy(btn) {
  const orig = btn.textContent;
  btn.textContent = 'copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

el('copyBtn').addEventListener('click', () => {
  let text = '';
  if (currentTab === 'formatted' && parsed !== null) text = JSON.stringify(parsed, null, getIndent());
  else if (currentTab === 'minified' && parsed !== null) text = JSON.stringify(parsed);
  else if (currentTab === 'tree' && parsed !== null) text = JSON.stringify(parsed, null, getIndent());
  if (text) {
    navigator.clipboard.writeText(text).then(() => flashCopy(el('copyBtn')));
  }
});

el('pathCopyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(currentPath).then(() => flashCopy(el('pathCopyBtn')));
});

// ── Input events ───────────────────────────────────────────────────────────
let inputTimer;
jsonInput.addEventListener('input', () => {
  clearTimeout(inputTimer);
  // Debounce for large JSON: 50ms for small, 200ms for large
  const delay = jsonInput.value.length > 100000 ? 300 : 50;
  inputTimer = setTimeout(() => processInput(jsonInput.value), delay);
});

// Tab key in textarea
jsonInput.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = jsonInput.selectionStart;
    const end = jsonInput.selectionEnd;
    const indent = getIndent();
    jsonInput.value = jsonInput.value.substring(0, start) + indent + jsonInput.value.substring(end);
    jsonInput.selectionStart = jsonInput.selectionEnd = start + indent.length;
  }
  // Ctrl/Cmd+Enter to format
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    el('formatBtn').click();
  }
});

// ── Drag & Drop ────────────────────────────────────────────────────────────
const inputPane = el('inputPane');
inputPane.addEventListener('dragover', e => {
  e.preventDefault();
  inputPane.classList.add('drag-over');
});
inputPane.addEventListener('dragleave', () => inputPane.classList.remove('drag-over'));
inputPane.addEventListener('drop', e => {
  e.preventDefault();
  inputPane.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showError({ message: 'File too large (max 5MB)' });
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    jsonInput.value = ev.target.result;
    processInput(ev.target.result);
    statusMsg.textContent = `Loaded: ${file.name}`;
    setTimeout(() => statusMsg.textContent = '', 3000);
  };
  reader.readAsText(file);
});

// ── Indent change re-renders ───────────────────────────────────────────────
el('indentSelect').addEventListener('change', () => {
  if (parsed !== null) renderCurrentTab();
});

})();
</script>
